name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job only reads the repo (checkout + lint/test/build).
# None write via GITHUB_TOKEN, so restrict it to read-only contents for all jobs.
permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
      - name: Install PHP dev tools
        run: composer install --no-interaction --no-progress
      - name: PHP syntax check (php -l)
        run: |
          find app -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l
      - name: PHP_CodeSniffer (PSR-12)
        run: vendor/bin/phpcs

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    services:
      mariadb:
        image: mariadb:10.3
        env:
          MARIADB_DATABASE: lescanetons_test
          MARIADB_USER: canetons
          MARIADB_PASSWORD: canetons
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli
          tools: composer
      - name: Install PHP dev tools
        run: composer install --no-interaction --no-progress
      - name: Seed test database
        run: |
          mysql -h 127.0.0.1 -u root -proot lescanetons_test < docker/db/init/01-schema.sql
          mysql -h 127.0.0.1 -u root -proot lescanetons_test < docker/db/init/02-seed.sql
      - name: PHPUnit
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: canetons
          TEST_DB_PASS: canetons
          TEST_DB_NAME: lescanetons_test
        run: vendor/bin/phpunit --log-junit=junit.xml
      - uses: actions/setup-node@v5
        if: always()
        with:
          node-version: "20"
      - name: Test result summary
        if: always()
        run: node tools/phpunit-summary.mjs junit.xml | tee test-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment test summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: phpunit
          path: test-summary.md
      - name: Publish PHPUnit check
        if: always()
        continue-on-error: true
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: junit.xml
          check_name: PHPUnit
          detailed_summary: true
          include_passed: false

  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Node dev tools
        run: npm ci
      - name: JS unit tests
        run: npm run test:js
      - name: ESLint
        run: npm run lint:js
      - name: Stylelint
        run: npm run lint:css
      - name: Prettier
        run: npm run format:check

  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Secret / prod-data guard
        run: node tools/secret-guard.mjs

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install Node dev tools
        run: npm ci
      - name: Build deploy artifact
        run: npm run build
      - name: Verify dist/build/ was produced
        run: test -f dist/build/index.php && test -d dist/build/vendor

  # Auto-deploy the built artifact to the TEST staging site on merge to main,
  # only after every other job is green. The FTP account can also reach qa/prod,
  # so: secrets live in the `test` GitHub Environment (add protection rules
  # there), deploy-test hard-refuses any target path without "test", and --prune
  # is never passed here (destructive deletes stay manual/local).
  deploy-test:
    runs-on: ubuntu-latest
    needs: [php, tests, assets, guard, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: test
    concurrency:
      group: deploy-test
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install Node dev tools
        run: npm ci
      - name: Deploy to TEST over FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: npm run deploy:test
