name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job only reads the repo (checkout + lint/test/build).
# None write via GITHUB_TOKEN, so restrict it to read-only contents for all jobs.
permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
      - name: Install PHP dev tools
        run: composer install --no-interaction --no-progress
      - name: PHP syntax check (php -l)
        run: |
          find app -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l
      - name: PHP_CodeSniffer (PSR-12)
        run: vendor/bin/phpcs

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    services:
      mariadb:
        image: mariadb:10.3
        env:
          MARIADB_DATABASE: lescanetons_test
          MARIADB_USER: canetons
          MARIADB_PASSWORD: canetons
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli
          tools: composer
      - name: Install PHP dev tools
        run: composer install --no-interaction --no-progress
      - name: Seed test database
        run: |
          mysql -h 127.0.0.1 -u root -proot lescanetons_test < docker/db/init/01-schema.sql
          mysql -h 127.0.0.1 -u root -proot lescanetons_test < docker/db/init/02-seed.sql
      - name: PHPUnit
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: canetons
          TEST_DB_PASS: canetons
          TEST_DB_NAME: lescanetons_test
        run: vendor/bin/phpunit --log-junit=junit.xml
      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: "20"
      - name: Test result summary
        if: always()
        run: node tools/phpunit-summary.mjs junit.xml | tee test-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment test summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: phpunit
          path: test-summary.md
      - name: Publish PHPUnit check
        if: always()
        continue-on-error: true
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: junit.xml
          check_name: PHPUnit
          detailed_summary: true
          include_passed: false

  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Node dev tools
        run: npm ci
      - name: ESLint
        run: npm run lint:js
      - name: Stylelint
        run: npm run lint:css
      - name: Prettier
        run: npm run format:check

  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Secret / prod-data guard
        run: node tools/secret-guard.mjs

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Node dev tools
        run: npm ci
      - name: Build deploy artifact
        run: npm run build
      - name: Verify public/ was produced
        run: test -f public/index.php && test -d public/vendor

  # Auto-deploy the built artifact to the TEST staging site on merge to main,
  # only after every other job is green. The FTP account can also reach qa/prod,
  # so: secrets live in the `test` GitHub Environment (add protection rules
  # there), deploy-test hard-refuses any target path without "test", and --prune
  # is never passed here (destructive deletes stay manual/local).
  deploy-test:
    runs-on: ubuntu-latest
    needs: [php, tests, assets, guard, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: test
    concurrency:
      group: deploy-test
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install Node dev tools
        run: npm ci
      - name: Deploy to TEST over FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: npm run deploy:test
      # Migration is a separate step (not chained into deploy:test) so
      # `deploy:test -- --dry-run` reaches deploy.mjs. It runs only if the deploy
      # step succeeded; a failed migration fails the job.
      - name: Apply DB migrations (TEST)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          MIGRATE_TOKEN: ${{ secrets.MIGRATE_TOKEN }}
          # TEST is behind HTTP Basic Auth; dbmigrate sends these to reach /api/migrate.
          BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASS: ${{ secrets.BASIC_AUTH_PASS }}
        run: npm run dbmigrate:test

  # Promote the SAME run's artifact to QA. The manual gate is the `qa` GitHub
  # Environment's Required-reviewers rule (Settings → Environments → qa) — the
  # run pauses here until a maintainer approves. Same commit as deploy-test, so
  # no "resolve latest green commit" step is needed.
  deploy-qa:
    runs-on: ubuntu-latest
    needs: [deploy-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: qa
    concurrency:
      group: deploy-qa
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      # Guard against out-of-order gate approvals. If main has advanced past this
      # run's commit (a newer merge is queued behind it), approving this older run
      # now would silently regress the environment to the stale commit. Refuse
      # unless this run's commit is still the tip of main. Only needs the tip SHA,
      # so it's shallow-clone-safe (no fetch depth required).
      - name: Refuse stale commit
        run: |
          git fetch --quiet origin main
          tip=$(git rev-parse origin/main)
          if [ "$tip" != "$GITHUB_SHA" ]; then
            echo "::error::main has advanced to $tip but this run targets $GITHUB_SHA — refusing to deploy a stale commit. Approve the newer run instead."
            exit 1
          fi
          echo "Confirmed $GITHUB_SHA is the current tip of main."
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install Node dev tools
        run: npm ci
      - name: Deploy to QA over FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: npm run deploy:qa
      # Separate step (not chained) so deploy:qa -- --dry-run reaches deploy.mjs.
      # QA is behind HTTP Basic Auth like TEST.
      - name: Apply DB migrations (QA)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          MIGRATE_TOKEN: ${{ secrets.MIGRATE_TOKEN }}
          BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASS: ${{ secrets.BASIC_AUTH_PASS }}
        run: npm run dbmigrate:qa

  # Promote the same artifact to PROD, gated by the `prod` GitHub Environment's
  # Required-reviewers rule. Only reachable after QA has been approved + deployed.
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [deploy-qa]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      # Guard against out-of-order gate approvals. If main has advanced past this
      # run's commit (a newer merge is queued behind it), approving this older run
      # now would silently regress the environment to the stale commit. Refuse
      # unless this run's commit is still the tip of main. Only needs the tip SHA,
      # so it's shallow-clone-safe (no fetch depth required).
      - name: Refuse stale commit
        run: |
          git fetch --quiet origin main
          tip=$(git rev-parse origin/main)
          if [ "$tip" != "$GITHUB_SHA" ]; then
            echo "::error::main has advanced to $tip but this run targets $GITHUB_SHA — refusing to deploy a stale commit. Approve the newer run instead."
            exit 1
          fi
          echo "Confirmed $GITHUB_SHA is the current tip of main."
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install Node dev tools
        run: npm ci
      - name: Deploy to PROD over FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: npm run deploy:prod
      # PROD safety: report pending migrations first (read-only), then apply.
      # Both run inside this manually-approved job (prod Environment gate). PROD
      # has no HTTP Basic Auth, so no BASIC_AUTH_* is sent.
      - name: Report pending DB migrations (PROD dry-run)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          MIGRATE_TOKEN: ${{ secrets.MIGRATE_TOKEN }}
        run: npm run dbmigrate:prod -- --dry-run
      - name: Apply DB migrations (PROD)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          MIGRATE_TOKEN: ${{ secrets.MIGRATE_TOKEN }}
        run: npm run dbmigrate:prod
