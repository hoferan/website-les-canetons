services:
  # One-shot init service: installs PHP deps into the shared `vendor` volume
  # with an autoload map correct for the web container's flattened layout
  # (App\ -> src/). Runs on every `up`, reconciling the volume to composer.lock,
  # then exits; web waits for it via service_completed_successfully. This is why
  # `docker compose up` needs no host-side vendor/ and no manual composer step.
  vendor:
    image: composer:2
    volumes:
      - ./composer.json:/repo/composer.json:ro
      - ./composer.lock:/repo/composer.lock:ro
      - ./docker/web/install-vendor.sh:/install-vendor.sh:ro
      - vendor:/app/vendor
    entrypoint: ["sh", "/install-vendor.sh"]

  # Rebuilds app/assets/dist/ whenever a JS/CSS source file under app/assets/
  # changes, so `web` always serves real built output from disk — same code
  # path as production, no HMR/second port. First build takes a few seconds
  # after `up`; a request to web before it finishes may 404 on an asset tag
  # until the initial watch build completes (self-resolves on the next
  # request/refresh, unlike the one-shot `vendor`/`migrate` services this
  # can't block on completion since it runs forever).
  assets:
    image: node:20
    working_dir: /repo
    volumes:
      - .:/repo
      - node_modules:/repo/node_modules
    command: sh -c "npm ci && npx vite build --watch"

  web:
    build: ./docker/web
    ports:
      - "8090:80"
    volumes:
      - ./app:/var/www/html
      - vendor:/var/www/html/vendor:ro
      - ./config/config.docker.php:/var/www/html/config.php:ro
    depends_on:
      vendor:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      assets:
        condition: service_started

  db:
    image: mariadb:10.3
    environment:
      MARIADB_DATABASE: lescanetons
      MARIADB_USER: canetons
      MARIADB_PASSWORD: canetons
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: ./docker/web
    working_dir: /repo
    volumes:
      - ./tools:/repo/tools:ro
      - ./sql/migrations:/repo/sql/migrations:ro
      - ./app/src:/repo/app/src:ro
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: lescanetons
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "tools/migrate.php", "sql/migrations"]
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  adminer:
    image: adminer:latest
    ports:
      - "8091:8080"
    depends_on:
      - db

volumes:
  db_data:
  vendor:
  node_modules:
