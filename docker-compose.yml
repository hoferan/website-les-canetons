services:
  # One-shot init service: installs PHP deps into the shared `vendor` volume
  # with an autoload map correct for the web container's flattened layout
  # (App\ -> src/). Runs on every `up`, reconciling the volume to composer.lock,
  # then exits; web waits for it via service_completed_successfully. This is why
  # `docker compose up` needs no host-side vendor/ and no manual composer step.
  vendor:
    image: composer:2
    volumes:
      - ./composer.json:/repo/composer.json:ro
      - ./composer.lock:/repo/composer.lock:ro
      - ./docker/web/install-vendor.sh:/install-vendor.sh:ro
      - vendor:/app/vendor
    entrypoint: ["sh", "/install-vendor.sh"]

  # Rebuilds app/assets/dist/ whenever a JS/CSS source file under app/assets/
  # changes, so `web` always serves real built output from disk — same code
  # path as production, no HMR/second port. First build takes a few seconds
  # after `up`; a request to web before it finishes may 404 on an asset tag
  # until the initial watch build completes (self-resolves on the next
  # request/refresh, unlike the one-shot `vendor`/`migrate` services this
  # can't block on completion since it runs forever).
  assets:
    image: node:20
    working_dir: /repo
    volumes:
      - .:/repo
      - node_modules:/repo/node_modules
    command: sh -c "npm ci && npx vite build --watch"

  web:
    build: ./docker/web
    ports:
      - "8090:80"
    volumes:
      - ./app:/var/www/html
      - vendor:/var/www/html/vendor:ro
      - ./config/config.docker.php:/var/www/html/config.php:ro
    depends_on:
      vendor:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      assets:
        condition: service_started

  db:
    image: mariadb:10.3
    environment:
      MARIADB_DATABASE: lescanetons
      MARIADB_USER: canetons
      MARIADB_PASSWORD: canetons
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: ./docker/web
    working_dir: /repo
    volumes:
      - ./tools:/repo/tools:ro
      - ./sql/migrations:/repo/sql/migrations:ro
      - ./app/src:/repo/app/src:ro
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: lescanetons
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "tools/migrate.php", "sql/migrations"]
    restart: "no"

  # --- Laravel API (api/) ------------------------------------------------
  # The new backend runs as its own service on :8092, independent of the old
  # app on :8090. Production dispatch (root .htaccess routing /api/* into
  # Laravel on the same origin) is a later sub-project; locally it's a
  # separate port so the two stacks don't interfere.

  # One-shot: install api/'s Composer deps into the shared `api_vendor` volume,
  # mirroring the old app's `vendor` service. No autoload rewrite is needed here
  # (unlike the old app's flattened layout): api/ is mounted whole, so vendor/
  # sits next to app/ exactly as api/composer.json's App\ -> app/ map expects.
  api-vendor:
    image: composer:2
    working_dir: /app
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor
    command: install --no-interaction --no-progress
    restart: "no"

  # One-shot: apply Laravel's own migrations against the separate lescanetons_api
  # database. Guarded migrations create the schema fresh here.
  api-migrate:
    build: ./docker/api
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
      - api_vendor:/var/www/api/vendor
    environment: &api-env
      APP_KEY: base64:laLm1TQBwlapjrscB5SkLK7IqyMJjX+p4VTcWKVQOE4=
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8092
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: lescanetons_api
      DB_USERNAME: canetons
      DB_PASSWORD: canetons
      SESSION_DRIVER: database
      SESSION_DOMAIN: localhost
      SANCTUM_STATEFUL_DOMAINS: localhost:8092,localhost,127.0.0.1
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
      MIGRATE_TOKEN: local-dev-migrate-token
    depends_on:
      api-vendor:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    command: ["php", "artisan", "migrate", "--force"]
    restart: "no"

  # The Laravel API dev server (PHP's built-in server via artisan serve). Host
  # edits under ./api are live; vendor/ lives in the api_vendor volume (never
  # the host tree). Reachable at http://localhost:8092.
  api:
    build: ./docker/api
    working_dir: /var/www/api
    ports:
      - "8092:8000"
    volumes:
      - ./api:/var/www/api
      - api_vendor:/var/www/api/vendor
    environment: *api-env
    depends_on:
      api-vendor:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  adminer:
    image: adminer:latest
    ports:
      - "8091:8080"
    depends_on:
      - db

volumes:
  db_data:
  vendor:
  api_vendor:
  node_modules:
