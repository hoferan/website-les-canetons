services:
  web:
    build: ./docker/web
    ports:
      - "8090:80"
    volumes:
      - ./code:/var/www/html
      - ./config/config.docker.php:/var/www/html/config.php:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  db:
    image: mariadb:10.3
    environment:
      MARIADB_DATABASE: lescanetons
      MARIADB_USER: canetons
      MARIADB_PASSWORD: canetons
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: ./docker/web
    working_dir: /repo
    volumes:
      - ./tools:/repo/tools:ro
      - ./sql/migrations:/repo/sql/migrations:ro
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: lescanetons
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "tools/migrate.php", "sql/migrations"]
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  adminer:
    image: adminer:latest
    ports:
      - "8091:8080"
    depends_on:
      - db

volumes:
  db_data:
